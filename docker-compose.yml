version: "3.9"

services:
  backend:
    build: ./backend
    container_name: traffic_backend
    ports:
      - "8000:8000"
    restart: always

  ai_engine:
    build: ./ai_engine
    container_name: vehicle_detection
    depends_on:
      - backend
    restart: always

